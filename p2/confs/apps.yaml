# APP 1  -> initContainer (busybox)
apiVersion: apps/v1                   # Versión de la API de K8s que usamos
kind: Deployment                      # Tipo de recurso: un Deployment
metadata:
  name: app-one                       # Nombre con el que K8s lo identifica
spec:
  replicas: 1                         # Cuántas copias del pod queremos
  selector:
    matchLabels:
      app: app-one                    # "Este Deployment gestiona los pods con esta etiqueta"
  template:                           # Plantilla para crear los pods
    metadata:
      labels:
        app: app-one                  # Etiqueta que tienen los pods creados
    spec:
      containers:
      - name: app-one
        image: nginx:alpine           # Imagen Docker que usa el contenedor
        ports:
        - containerPort: 80           # Puerto que expone el contenedor
        volumeMounts:
        - name: html
          mountPath: /usr/share/nginx/html
      initContainers:
      - name: init-html
        image: busybox
        command: ['sh', '-c', 'echo "<h1>Hello from app1</h1>" > /html/index.html']
        volumeMounts:
        - name: html
          mountPath: /html
      volumes:
      - name: html
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: app-one                       # Nombre del Service (también es su DNS interno)
spec:
  selector:
    app: app-one                      # "Apunta a los pods que tengan esta etiqueta"
  ports:
  - port: 80                          # Puerto por el que escucha el Service
    targetPort: 80                     # Puerto del pod al que redirige
---
# APP 2 (3 replicas)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-two
spec:
  replicas: 3
  selector:
    matchLabels:
      app: app-two
  template:
    metadata:
      labels:
        app: app-two
    spec:
      containers:
      - name: app-two
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html
          mountPath: /usr/share/nginx/html
      initContainers:
      - name: init-html
        image: busybox
        command: ['sh', '-c', 'echo "<h1>Hello from app2</h1>" > /html/index.html']
        volumeMounts:
        - name: html
          mountPath: /html
      volumes:
      - name: html
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: app-two
spec:
  selector:
    app: app-two
  ports:
  - port: 80
    targetPort: 80
